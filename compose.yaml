name: banner-fingerprint

services:
  server:
    image: banner-fingerprint-server:local
    build:
      context: .
      target: server
    environment:
      ADDR: ":8080"
      RULES_FILE: /app/rules/rules.json
      MAX_BODY_BYTES: "16777216"
      MAX_BATCH_SIZE: "10000"
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    networks:
      - fingerprint
    healthcheck:
      test:
        [
          "CMD",
          "/app/server",
          "healthcheck",
          "-url",
          "http://127.0.0.1:8080/health",
          "-timeout",
          "2s",
        ]
      interval: 5s
      timeout: 3s
      start_period: 2s
      retries: 10
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    stop_grace_period: 10s

  client:
    image: banner-fingerprint-client:local
    build:
      context: .
      target: client
    command:
      [
        "-input",
        "/data/sample.json",
        "-server",
        "http://server:8080",
        "-timeout",
        "10s",
      ]
    depends_on:
      server:
        condition: service_healthy
        restart: true
    networks:
      - fingerprint
    restart: "no"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 32
    mem_limit: 64m
    cpus: 0.25

networks:
  fingerprint:
    internal: true
